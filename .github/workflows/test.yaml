name: test
on: [push, workflow_dispatch]
jobs:
  unit:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install iverilog
        shell: bash
        run: sudo apt-get update && sudo apt-get install -y iverilog

      # Set Python up and install cocotb
      - name: Setup python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Python packages
        shell: bash
        run: pip install -r test/requirements.txt

      - name: Run unit tests
        run: |
          cd test
          pytest -v --junitxml=results.xml

      - name: Test Summary
        uses: test-summary/action@v2.4
        with:
          paths: "test/results.xml"
        if: always()

      - name: upload test results
        if: success() || failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          if-no-files-found: ignore
          path: |
            test/results.xml
            test/sim_build/**/*.fst

  synth:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install yosys
        shell: bash
        run: sudo apt-get update && sudo apt-get install -y yosys

      - name: Synthesis check (per module)
        shell: bash
        run: |
          cd test
          ./synth_check.sh quarter_round
          ./synth_check.sh chacha20_core

  # Top-level integration test via the Tiny Tapeout Makefile (tb.v + cocotb),
  # including gate-level sign-off (make GATES=yes).
  top-level:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install iverilog
        shell: bash
        run: sudo apt-get update && sudo apt-get install -y iverilog

      - name: Setup python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Python packages
        shell: bash
        run: pip install -r test/requirements.txt

      - name: Run top-level test
        run: |
          cd test
          make clean
          make
          # make returns success even if the test fails, so check results.xml
          ! grep failure results.xml
